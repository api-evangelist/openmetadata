name: OpenMetadata Plans and Pricing
description: OpenMetadata is open-source software available under the Apache 2.0 license and free for self-hosting. The commercial managed service (Collate) offers tiered SaaS plans ranging from a free tier to enterprise, with pricing based on users and data assets. The open-source platform has no licensing cost; commercial plans are offered through Collate.
version: '0.1'
url: https://www.getcollate.io/pricing
plans:
  - name: Open Source (Self-Hosted)
    description: The full OpenMetadata platform, free to deploy and operate on your own infrastructure under the Apache 2.0 license. No user or asset limits imposed by the software itself.
    price: Free
    currency: USD
    billingCycle: N/A
    type: self-hosted
    features:
      - Full OpenMetadata platform
      - Unlimited users (self-managed)
      - Unlimited data assets (self-managed)
      - 130+ data connectors
      - REST API access
      - Python, Java, and Go SDKs
      - MCP server integration
      - Data lineage, quality, and governance
      - Community Slack support
    limits:
      users: unlimited
      dataAssets: unlimited
      apiAccess: full
  - name: Free (Collate SaaS)
    description: Managed SaaS offering with no cost for small data teams. Includes a limited set of users and data assets on a multi-tenant deployment.
    price: Free
    currency: USD
    billingCycle: monthly
    type: saas
    features:
      - 5 users included
      - 500 data assets included
      - Multi-tenant SaaS deployment
      - Weekly data refresh
      - Limited column lineage
      - Up to 10 quality test cases
      - Community support
    limits:
      users: 5
      dataAssets: 500
      dataRefresh: weekly
      qualityTestCases: 10
  - name: Premium (Collate SaaS)
    description: For teams and small businesses requiring more users, assets, and enterprise features such as SSO and PII classification.
    price: Contact Sales
    currency: USD
    billingCycle: monthly
    type: saas
    features:
      - 25 users included
      - 5,000 data assets included
      - Single-tenant or Hybrid SaaS deployment
      - 8-hour data refresh
      - Full column lineage
      - Unlimited quality test cases
      - PII classification
      - SSO integration
    limits:
      users: 25
      dataAssets: 5000
      dataRefresh: 8hours
  - name: Enterprise (Collate SaaS)
    description: For complex enterprise use cases requiring dedicated infrastructure, unlimited scalability, and advanced governance capabilities.
    price: Custom
    currency: USD
    billingCycle: annual
    type: saas
    features:
      - 50+ users (unlimited options available)
      - 10,000+ data assets (unlimited options available)
      - Single-tenant, Hybrid, or Private BYOC deployment
      - Hourly data refresh
      - Full column lineage
      - Unlimited quality test cases
      - PII classification
      - Custom integrations
      - SSO integration
      - Dedicated support
    limits:
      users: 50
      dataAssets: 10000
      dataRefresh: hourly
  - name: Collate AI Add-on
    description: AI enhancement layer including AskCollate, AI Studio, AI Analytics, AutoPilot, and specialized data agents. Priced as an add-on to any paid plan.
    price: Custom
    currency: USD
    billingCycle: annual
    type: add-on
    features:
      - AskCollate natural language query
      - AI Studio for custom AI workflows
      - AI Analytics dashboards
      - AutoPilot automated metadata management
      - Specialized data agents

apis:
  - aid: openmetadata:openmetadata-rest-api
    name: OpenMetadata REST API
    description: The OpenMetadata REST API provides programmatic access to metadata assets including tables, dashboards, pipelines, topics, ML models, data quality tests, lineage graphs, glossaries, classifications, teams, and governance policies. The API follows REST design best practices with a schema-first approach using JSON Schema type definitions.
